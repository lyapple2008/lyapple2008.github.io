# 十、关键总结（非常重要）

👉 **Agent 决定“该不该买”**
👉 **Harness 决定“能不能买”**

---

👉 如果没有 Harness：

⚠️ Agent 可能：

* 过度交易
* 满仓梭哈
* 被噪声误导

---

👉 如果只有 Harness：

⚠️ 系统不会“思考”

