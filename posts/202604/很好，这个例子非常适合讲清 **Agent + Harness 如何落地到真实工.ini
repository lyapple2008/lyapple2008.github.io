很好，这个例子非常适合讲清 **Agent + Harness 如何落地到真实工作流**。我用一个“从选股 → 决策 → 下单 → 复盘”的完整流程，帮你设计一个**可实现的系统架构**（而不是空概念）。

---

# 一、先定义任务工作流（理财版）

你的目标其实可以拆成👇

## 🎯 股票投资工作流

1. 市场扫描（找机会）
2. 公司筛选（基本面分析）
3. 估值判断（是否低估）
4. 风险评估
5. 买入/卖出决策
6. 执行交易
7. 持仓监控
8. 复盘优化

---

👉 关键点：
这个流程不是一次性的，而是**持续循环系统**

---

# 二、Agent 在这个系统里做什么？

## 🧠 Agent = 投资分析师

它负责“动脑子”的部分：

### 1. 信息理解

* 财报
* 新闻
* 行业趋势

例如：

* AAPL
* TSLA

---

### 2. 推理与决策

比如：

> “TSLA 最近下跌 15%，是否是买入机会？”

Agent 会：

* 分析原因（宏观 / 公司）
* 判断是否短期波动
* 给出建议

---

### 3. 生成行动计划

输出类似：

```text
1. 检查最新财报
2. 对比行业估值
3. 判断是否低估
4. 给出买入建议
```

---

# 三、Harness 在这个系统里做什么？

## 🛠 Harness = 交易系统 + 风控系统

它负责：

---

## 1. 数据接入（Tools 管理）

例如：

* 行情 API（价格、K线）
* 财报 API
* 新闻 API

---

## 2. 权限控制（非常关键）

例如：

| 操作   | 是否允许   |
| ---- | ------ |
| 查看数据 | ✅      |
| 给建议  | ✅      |
| 自动下单 | ❌ / 可选 |
| 大额交易 | ❌      |

---

👉 防止 Agent “乱买股票”

---

## 3. 执行控制

例如：

```text
Agent: 建议买入 TSLA

Harness:
→ 是否超过仓位限制？
→ 是否超过风险阈值？
→ 是否需要人工确认？
```

---

## 4. 风控系统

* 最大回撤限制
* 单股仓位限制
* 止损策略

---

