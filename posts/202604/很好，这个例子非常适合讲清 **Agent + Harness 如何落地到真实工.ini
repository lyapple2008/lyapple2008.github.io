# 五、结合真实公司说明（更直观）

我们举个例子👇

---

## 🎯 场景：分析 NVDA

---

## Step 1：Harness 拉数据

* GPU 市场增长
* AI 热度
* 财报

---

## Step 2：Agent 分析

输出：

```text
- AI需求强劲
- 收入增长 > 50%
- 估值偏高，但增长支撑

建议：小仓位买入
```

---

## Step 3：Harness 风控

```text
当前仓位：30%
单股限制：20%

👉 不允许继续买入
```

---

## Step 4：执行

* ❌ 拒绝执行
* 或 ✅ 调整买入量

---

👉 这一步就是 Harness 的价值！

---

# 六、如何开发一个可用系统（分阶段）

---

## 🟢 阶段 1：分析型 Agent（最简单）

只做：

* 输入：股票代码
* 输出：分析报告

👉 不涉及交易

---

## 🟡 阶段 2：建议型 Agent

增加：

* 买/卖建议
* 风险评分

---

## 🔴 阶段 3：半自动交易系统

* Agent 给建议
* Harness 控制执行
* 人工确认

---

## ⚫ 阶段 4：全自动（谨慎！）

* 自动交易
* 强风控

---

# 七、结合 Claude Code 的类比

用 Claude Code 来类比👇

---

## Agent = Claude 模型

* 分析代码
* 生成 patch

---

## Harness = CLI

* 控制是否：

  * 修改代码
  * 执行命令

---

## 对应关系

| Claude Code  | 投资系统   |
| ------------ | ------ |
| 修改代码         | 买股票    |
| run shell    | 下单     |
| accept edits | 是否允许交易 |

---

👉 本质完全一样！

