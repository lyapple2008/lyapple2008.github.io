```

---

## 🧩 3. Harness 层（核心）

```python
class Harness:
    def __init__(self, agent, tools):
        self.agent = agent
        self.tools = tools

    def run(self, stock):
        data = self.collect_data(stock)

        decision = self.agent.decide(data)

        if self.risk_check(decision):
            self.execute(decision)

    def risk_check(self, decision):
        # 仓位控制 / 风险限制
        return True

    def execute(self, decision):
        # 是否真的下单
        pass
```

