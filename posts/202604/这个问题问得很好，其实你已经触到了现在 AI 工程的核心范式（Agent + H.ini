# 方案一：最简单 Agent（Python版）

## 1. Agent 核心（LLM + 工具）

```python
class SimpleAgent:
    def __init__(self, llm, tools):
        self.llm = llm
        self.tools = tools

    def run(self, task):
        plan = self.llm.generate_plan(task)
        for step in plan:
            self.execute(step)

    def execute(self, step):
        if step.type == "edit_file":
            self.tools.edit_file(step)
        elif step.type == "run_cmd":
            self.tools.run_cmd(step)
```

---

## 2. Tools（关键）

```python
class Tools:
    def edit_file(self, step):
        # 修改代码
        pass

    def run_cmd(self, step):
        # 执行shell
        pass
```

---

## 3. Harness（控制层）

```python
class Harness:
    def __init__(self, agent):
        self.agent = agent

    def run(self, task):
        print("Plan preview...")
        # 👉 控制是否自动执行
        confirm = input("Run? y/n")

        if confirm == "y":
            self.agent.run(task)
```

