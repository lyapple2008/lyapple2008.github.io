# 一、什么是 Agent？

**一句话：**
👉 Agent = “会自己思考 + 会用工具 + 能完成任务的 AI”

---

## 1. Agent 的核心能力

一个完整的 Agent 一般包含：

### （1）感知（Perception）

* 接收输入（用户问题 / 文件 / 代码）
* 理解上下文

👉 在 Claude Code 中：

* 读取你的 repo
* 理解代码结构

---

### （2）决策（Planning / Reasoning）

* 分解任务
* 规划步骤

例如：

> “帮我加一个语音识别功能”

Agent 会自动拆成：

1. 找入口代码
2. 设计 API
3. 写实现
4. 修改调用

---

### （3）行动（Action）

* 调用工具（关键！）

比如：

* 写文件
* 执行 shell
* 调 git
* 运行测试

👉 Claude Code 的典型能力：

* `edit file`
* `run command`
* `search repo`

---

### （4）记忆（Memory）

* 短期：当前任务上下文
* 长期：历史知识 / 项目结构

---

## 2. 一个直观类比

| 角色     | 类比                   |
| ------ | -------------------- |
| LLM    | 大脑                   |
| Agent  | 一个工程师                |
| Tools  | IDE / Terminal / Git |
| Memory | 笔记 / 文档              |

---

# 二、什么是 Harness？

**一句话：**
👉 Harness = “控制 Agent 怎么工作的一层系统”

---

## 1. Harness 做什么？

它不负责“聪明”，而负责：

### （1）流程控制

* 任务怎么开始？
* 是否需要确认？
* 是否自动执行？

---

### （2）权限控制（非常重要）

比如：

* 是否允许改代码？
* 是否允许执行 shell？
* 是否允许访问网络？

👉 在 Claude Code 里：

```bash
accept edits on
```

就是 Harness 的一部分（权限开关）

---

### （3）工具调度

* 提供哪些工具给 Agent？
* 如何调用？

---

### （4）安全机制

* sandbox
* 限制危险操作
* 防止误删代码

---

## 2. Agent vs Harness

|    | Agent   | Harness    |
| -- | ------- | ---------- |
| 本质 | AI能力    | 控制系统       |
| 职责 | 思考 + 决策 | 管流程 + 权限   |
| 类比 | 工程师     | 工程经理 / IDE |

---

# 三、Claude Code = Agent + Harness 的典型实现

我们直接拆一下它👇

---

## 1. Agent 部分

Claude 模型负责：

* 理解代码
* 规划修改
* 生成 patch

---

## 2. Harness 部分（CLI）

Claude Code CLI 做：

### ✔ 工具层

* 文件读写
* git
* shell

### ✔ 权限层

```bash
accept edits on
```

### ✔ 执行策略

* 自动 / 手动审批
* 分步执行

---

## 3. 一个真实执行流程

你输入：

```bash
add speech recognition feature
```

---

### Step 1（Agent）

Claude：

* 分析代码结构
* 制定 plan

---

### Step 2（Harness）

CLI：

* 展示 plan
* 等你确认

---

### Step 3（Agent）

生成 patch

---

### Step 4（Harness）

* 应用 patch
* 执行命令

---

👉 关键：
**Agent 决定“做什么”**
**Harness 决定“能不能做、怎么做”**

